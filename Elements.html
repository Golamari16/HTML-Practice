<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--Block level elements 
    it starts on a new line and takes up the full width of the container example
    <p>, <h1> to <h6>, <div>, <section>, <article>, <header>, <footer>, <nav>, <aside> etc.
     we can change height and width of these elements-->
        <h1>Main paragraph</h1>
        <h2>main paragrapgh</h2>
    <!-- inline level elements
        it does not start on a new line and only takes up as much width as necessary example
        <span>, <a>, <strong>, <em>, <img> etc.
         we cannot change height and width of these elements-->
            <p>This is a <span style="color:red">red</span> text.</p>

    <!--inline-block elements
        it folliws the flow of inline elements but behaves like a block element in terms of height
        it does not start on a new line but can have its height and width set
        [inline+height and width can be  changed]
        img tag occupy the required space,erst space is free for other elements-->
    </body>
</html>
