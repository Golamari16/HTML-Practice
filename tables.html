<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--table
    how to create a table
    table tag
    table row-tr tag
    table header-th tag
    table data-td tag
    table attributes
    1.border- it is used to add border to the table
    2.cellpadding- it is used to add space between the cell content and the cell
    3.cellspacing- it is used to add space between the cells
    4.width- it is used to set the width of the table
    5.height- it is used to set the height of the table
    6.align- it is used to align the table to left, right or center
    7.bgcolor- it is used to set the background color of the table
    8.colspan- it is used to merge the cells horizontally
    9.rowspan- it is used to merge the cells vertically
    -->
    <!-- how to add border  in table
     use border tag
     
     how to change the height and width of the table
        use height and width tag
     
     
     how to add space inside the cell
        use cellpadding tag-we can add the space in pixel or in percentage
        this is an attribute of table tag
        use in the table tag only not in td tag
     

        how to add the space outside the cell
        use cellspacing tag-we can add the space in pixel or in percentage
     -->
    <table border="1" height="50px" width="50%" cellpadding="10px" cellspacing="20px">
        <!--1st row-->
        <tr>
            <td>cell 1</td>
            <td>cell 2</td>
            <td>cell 3</td>
        </tr>
        <!--2nd row-->
        <tr>
            <td>cell 4</td>
            <td>cell 5</td>
            <td>cell 6</td>
        </tr>
        <!--3rd row-->  
        <tr>
            <td>cell 7</td>
            <td>cell 8</td>
            <td>cell 9</td>
    </table>
</body>
</html>
